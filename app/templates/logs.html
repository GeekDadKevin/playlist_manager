{% extends 'base.html' %}

{% block title %}App Logs{% endblock %}

{% block content %}
<div class="card">
  <div class="log-toolbar">
    <h2 style="margin:0">App Logs</h2>
    <div class="log-controls">
      <label class="log-toggle">
        <input type="checkbox" id="auto-refresh" checked>
        <span>Auto-refresh</span>
      </label>
      <span id="log-meta" class="help-text"></span>
      <form method="post" action="{{ url_for('web.logs_clear') }}" style="display:inline"
            onsubmit="return confirm('Clear the log file?')">
        <button type="submit" class="btn-danger-sm">Clear log</button>
      </form>
    </div>
  </div>

  <div class="log-shell" id="log-shell">
    <pre id="log-output" class="log-output">Loading…</pre>
  </div>
</div>

<style>
  .log-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .5rem;
    margin-bottom: .75rem;
  }
  .log-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .log-toggle {
    display: flex;
    align-items: center;
    gap: .35rem;
    cursor: pointer;
    user-select: none;
  }
  .log-shell {
    background: var(--color-surface, #111);
    border: 1px solid var(--color-border, #333);
    border-radius: 4px;
    height: 70vh;
    overflow-y: auto;
    padding: .5rem;
  }
  .log-output {
    margin: 0;
    font-size: .78rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-line { display: block; }
  .log-line.DEBUG  { color: #888; }
  .log-line.INFO   { color: #ccc; }
  .log-line.WARNING  { color: #f5a623; }
  .log-line.ERROR    { color: #e05252; }
  .log-line.CRITICAL { color: #ff4444; font-weight: bold; }

  .btn-danger-sm {
    padding: .25rem .6rem;
    font-size: .8rem;
    border: 1px solid #a33;
    background: transparent;
    color: #e05252;
    border-radius: 3px;
    cursor: pointer;
  }
  .btn-danger-sm:hover { background: #a33; color: #fff; }
</style>
{% endblock %}

{% block scripts %}
<script>
  const dataUrl = {{ url_for('web.logs_data') | tojson }};
  const shell   = document.getElementById('log-shell');
  const output  = document.getElementById('log-output');
  const meta    = document.getElementById('log-meta');
  const toggle  = document.getElementById('auto-refresh');

  const LEVELS = ['DEBUG', 'INFO', 'WARNING', 'ERROR', 'CRITICAL'];

  function levelOf(line) {
    for (const lvl of LEVELS) {
      if (line.includes(' ' + lvl + ' ') || line.includes(' ' + lvl + '\t')) return lvl;
    }
    return 'INFO';
  }

  function render(lines, total, showing) {
    const atBottom = shell.scrollHeight - shell.scrollTop - shell.clientHeight < 40;
    output.innerHTML = lines.map(line => {
      const lvl = levelOf(line);
      const safe = line
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
      return `<span class="log-line ${lvl}">${safe}</span>`;
    }).join('\n');
    meta.textContent = showing < total
      ? `showing last ${showing} of ${total} lines`
      : `${total} line${total !== 1 ? 's' : ''}`;
    if (atBottom) shell.scrollTop = shell.scrollHeight;
  }

  async function fetchLogs() {
    try {
      const res = await fetch(dataUrl + '?limit=500', { cache: 'no-store' });
      const data = await res.json();
      render(data.lines || [], data.total || 0, data.showing || 0);
    } catch (err) {
      output.textContent = 'Error fetching logs: ' + err.message;
    }
  }

  // Initial load + scroll to bottom
  fetchLogs().then(() => { shell.scrollTop = shell.scrollHeight; });

  let timer = setInterval(fetchLogs, 2000);
  toggle.addEventListener('change', () => {
    clearInterval(timer);
    if (toggle.checked) timer = setInterval(fetchLogs, 2000);
  });
</script>
{% endblock %}
